version: 1
name: counseling-agent-frontend-sdk-contract
sprint: Sprint 2 mood trend MVP
description: |
  心理咨询 Agent 前端 API 契约。

  目标是支撑如下前端闭环：
  登录/注册 -> 年龄模式落库 -> 首页情绪记录与趋势 -> 文本聊天 -> 高风险时展示 SOS -> 基础记忆 -> 知识库搜索/详情/问答。

  本契约不包含后续 Sprint 或占位能力：
  tests、voice、完整 RAG。

client:
  className: CounselingApi
  sourceFile: frontend/src/api/endpoints.ts
  framework:
    name: vue
    version: 3
    buildTool: vite
    language: TypeScript
  transport:
    protocol: http
    implementation: fetch
  auth:
    type: bearer-token
    tokenProvider: ApiClient.getAccessToken
    attachToMethods:
      - getCurrentUser
      - startThread
      - sendMessage
      - listMemories
      - updateMemory
      - deleteMemory
      - clearMemories
      - createMoodLog
      - getMoodTrend
      - searchKnowledge
      - getKnowledgeArticle
      - askKnowledge
      - listKnowledgeGaps
      - resolveKnowledgeGap
      - createCrisisEvent
    note: 当前后端脚手架尚未强制校验 token，但联调时前端仍应按正式 Bearer 方式传递。
  baseUrl:
    example: http://localhost:8000
  basePath: /api/v1

scope:
  included:
    - auth
    - chat
    - memory
    - mood
    - safety
    - knowledge
  excluded:
    - tests
    - voice

implementationStatus:
  currentSdkImplementedMethods:
    - startThread
    - sendMessage
    - streamMessage
    - listMemories
    - createMoodLog
    - getMoodTrend
    - searchKnowledge
    - getKnowledgeArticle
    - askKnowledge
    - listKnowledgeGaps
    - resolveKnowledgeGap
  note: 当前 `frontend/src/api/endpoints.ts` 已实现 Sprint 2 知识库与情绪趋势 MVP 所需方法。

flows:
  sprint1Demo:
    - step: register
      when: 新用户首次进入
    - step: login
      when: 已注册用户再次进入
    - step: getCurrentUser
      when: 应用恢复会话或刷新后
    - step: startThread
      when: 用户点击“我想倾诉”
    - step: sendMessage
      when: 对话页发送文本消息
    - step: createCrisisEvent
      when: sendMessage 返回 risk_level 为 L2 或 L3
    - step: getSafetyResources
      when: 需要展示 SOS 页面或安全资源卡片
    - step: listMemories
      when: 我的页查看基础记忆
    - step: createMoodLog
      when: 用户完成基础情绪记录
    - step: getMoodTrend
      when: 首页展示 7 天或 30 天趋势
    - step: searchKnowledge
      when: 用户进入知识页或搜索主题
    - step: getKnowledgeArticle
      when: 用户打开知识详情
    - step: askKnowledge
      when: 用户围绕知识主题继续提问

methods:
  - methodName: register
    summary: 用户注册并返回 token 与 user_mode
    requestType: RegisterRequest
    responseType: RegisterResponse
    authRequired: false
    uiEntry:
      - 登录/注册页
      - 年龄确认页
    http:
      method: POST
      path: /api/v1/auth/register

  - methodName: login
    summary: 用户登录
    requestType: LoginRequest
    responseType: LoginResponse
    authRequired: false
    uiEntry:
      - 登录/注册页
    http:
      method: POST
      path: /api/v1/auth/login

  - methodName: getCurrentUser
    summary: 获取当前登录用户信息
    requestType: none
    responseType: CurrentUserResponse
    authRequired: true
    uiEntry:
      - 启动页
      - 首页
      - 我的页
    http:
      method: GET
      path: /api/v1/auth/me

  - methodName: startThread
    summary: 创建文本聊天线程
    requestType: StartThreadRequest
    responseType: StartThreadResponse
    authRequired: true
    uiEntry:
      - 首页
    http:
      method: POST
      path: /api/v1/chat/threads

  - methodName: sendMessage
    summary: 发送用户文本消息并获取助手回复
    requestType: SendMessageRequest
    responseType: SendMessageResponse
    authRequired: true
    pathParams:
      - name: threadId
        mapsTo: thread_id
        type: string
    uiEntry:
      - 对话页
    http:
      method: POST
      pathTemplate: /api/v1/chat/threads/{thread_id}/messages

  - methodName: streamMessage
    summary: 流式发送用户消息并逐步接收助手回复
    requestType: SendMessageRequest
    responseType: ChatStreamEvent
    authRequired: true
    pathParams:
      - name: threadId
        mapsTo: thread_id
        type: string
    uiEntry:
      - 对话页
    http:
      method: POST
      pathTemplate: /api/v1/chat/threads/{thread_id}/stream
      responseContentType: text/event-stream
    events:
      - event: graph_update
        schema: ChatStreamGraphUpdateEvent
      - event: token
        schema: ChatStreamTokenEvent
      - event: final
        schema: ChatStreamFinalEvent
    fallback:
      beforeFirstEvent: call sendMessage with the same payload and fill the current assistant bubble
      afterFirstEvent: do not resend; refresh thread messages from the server

  - methodName: listMemories
    summary: 获取记忆列表
    requestType: none
    responseType: ListMemoriesResponse
    authRequired: true
    uiEntry:
      - 我的页
    http:
      method: GET
      path: /api/v1/memories

  - methodName: updateMemory
    summary: 修改单条记忆
    requestType: UpdateMemoryRequest
    responseType: MemoryMutationResponse
    authRequired: true
    pathParams:
      - name: memoryId
        mapsTo: memory_id
        type: string
    uiEntry:
      - 我的页
    http:
      method: PATCH
      pathTemplate: /api/v1/memories/{memory_id}

  - methodName: deleteMemory
    summary: 删除单条记忆
    requestType: none
    responseType: MemoryMutationResponse
    authRequired: true
    pathParams:
      - name: memoryId
        mapsTo: memory_id
        type: string
    uiEntry:
      - 我的页
    http:
      method: DELETE
      pathTemplate: /api/v1/memories/{memory_id}

  - methodName: clearMemories
    summary: 清空全部记忆
    requestType: none
    responseType: StatusResponse
    authRequired: true
    uiEntry:
      - 我的页
    http:
      method: DELETE
      path: /api/v1/memories

  - methodName: createMoodLog
    summary: 提交基础情绪记录
    requestType: MoodLogRequest
    responseType: MoodLogResponse
    authRequired: true
    uiEntry:
      - 首页
      - 情绪 check-in 表单
    http:
      method: POST
      path: /api/v1/moods

  - methodName: getMoodTrend
    summary: 获取 7 天或 30 天情绪趋势
    requestType: MoodTrendQuery
    responseType: MoodTrendResponse
    authRequired: true
    uiEntry:
      - 首页趋势卡片
    http:
      method: GET
      path: /api/v1/moods/trends?range={range}

  - methodName: searchKnowledge
    summary: 搜索知识库文章
    requestType: SearchKnowledgeQuery
    responseType: KnowledgeSearchResponse
    authRequired: false
    uiEntry:
      - 知识页
    http:
      method: GET
      path: /api/v1/knowledge/search

  - methodName: getKnowledgeArticle
    summary: 获取知识文章详情
    requestType: none
    responseType: KnowledgeArticleResponse
    authRequired: false
    pathParams:
      - name: articleId
        mapsTo: article_id
        type: string
    uiEntry:
      - 知识页
    http:
      method: GET
      pathTemplate: /api/v1/knowledge/articles/{article_id}

  - methodName: askKnowledge
    summary: 围绕知识库做结构化问答
    requestType: AskKnowledgeRequest
    responseType: AskKnowledgeResponse
    authRequired: false
    uiEntry:
      - 知识页
      - 对话页知识上下文入口
    http:
      method: POST
      path: /api/v1/knowledge/ask

  - methodName: listKnowledgeGaps
    summary: 查看知识库待补充问题
    requestType: KnowledgeGapQuery
    responseType: KnowledgeGapListResponse
    authRequired: false
    query:
      - name: status
        type: string
        required: false
        default: open
      - name: limit
        type: number
        required: false
        default: 50
    uiEntry:
      - 后台知识审核页
    http:
      method: GET
      path: /api/v1/knowledge/gaps

  - methodName: resolveKnowledgeGap
    summary: 人工补内容后标记知识缺口已解决
    requestType: ResolveKnowledgeGapRequest
    responseType: KnowledgeGapMutationResponse
    authRequired: false
    pathParams:
      - name: gapId
        mapsTo: gap_id
        type: string
    uiEntry:
      - 后台知识审核页
    http:
      method: POST
      pathTemplate: /api/v1/knowledge/gaps/{gap_id}/resolve

  - methodName: getSafetyResources
    summary: 获取 SOS 资源列表
    requestType: GetSafetyResourcesQuery
    responseType: SafetyResourcesResponse
    authRequired: false
    query:
      - name: region
        type: string
        required: false
        default: CN
      - name: audience
        type: SafetyAudience
        required: false
        default: all
    uiEntry:
      - SOS 页面
      - 对话页高风险卡片
    http:
      method: GET
      path: /api/v1/safety/resources

  - methodName: createCrisisEvent
    summary: 记录高风险危机事件
    requestType: CrisisEventRequest
    responseType: CrisisEventResponse
    authRequired: true
    uiEntry:
      - 对话页
      - SOS 页面
    http:
      method: POST
      path: /api/v1/safety/crisis-events

types:
  AgeRange:
    type: enum
    values:
      - 13_15
      - 16_17
      - 18_plus

  UserMode:
    type: enum
    values:
      - teen
      - adult

  ThreadMode:
    type: enum
    values:
      - companion
      - knowledge
      - test
      - crisis
    note: Sprint 1 页面流只使用 companion，其余值保留字段兼容性。

  InputType:
    type: enum
    values:
      - text
      - voice
      - test
      - system

  RiskLevel:
    type: enum
    values:
      - L0
      - L1
      - L2
      - L3

  SafetyAudience:
    type: enum
    values:
      - all
      - teen
      - adult

  RegisterRequest:
    type: object
    required:
      - email
      - password
      - age_range
    fields:
      email:
        type: string
        format: email
      password:
        type: string
      age_range:
        type: AgeRange

  RegisterResponse:
    type: object
    required:
      - user_id
      - access_token
      - refresh_token
      - user_mode
      - onboarding_completed
    fields:
      user_id: { type: string }
      access_token: { type: string }
      refresh_token: { type: string }
      user_mode: { type: UserMode }
      onboarding_completed: { type: boolean }

  LoginRequest:
    type: object
    required:
      - email
      - password
    fields:
      email:
        type: string
        format: email
      password: { type: string }

  LoginResponse:
    type: object
    required:
      - access_token
      - refresh_token
    fields:
      access_token: { type: string }
      refresh_token: { type: string }

  CurrentUserResponse:
    type: object
    required:
      - user_id
      - nickname
      - user_mode
    fields:
      user_id: { type: string }
      nickname: { type: string }
      user_mode: { type: UserMode }

  StartThreadRequest:
    type: object
    fields:
      mode:
        type: ThreadMode
        required: false
      title:
        type: string
        required: false

  StartThreadResponse:
    type: object
    required:
      - thread_id
      - langgraph_thread_id
      - mode
      - title
    fields:
      thread_id: { type: string }
      langgraph_thread_id: { type: string }
      mode: { type: string }
      title: { type: string }

  SendMessageRequest:
    type: object
    required:
      - user_id
      - content
    fields:
      user_id: { type: string }
      content: { type: string }
      input_type:
        type: InputType
        required: false
      user_mode:
        type: UserMode
        required: false

  AssistantMessage:
    type: object
    required:
      - assistant_text
      - risk_level
      - intent
      - suggested_actions
      - session_summary
      - should_write_memory
    fields:
      assistant_text: { type: string }
      risk_level: { type: RiskLevel }
      intent: { type: string }
      suggested_actions:
        type: array
        items: { type: string }
      session_summary: { type: string }
      should_write_memory: { type: boolean }

  SendMessageResponse:
    type: object
    required:
      - thread_id
      - assistant_message
    fields:
      thread_id: { type: string }
      assistant_message:
        type: AssistantMessage

  ChatStreamTokenEvent:
    type: object
    required:
      - text
    fields:
      text: { type: string }

  ChatStreamGraphUpdateEvent:
    type: object
    required:
      - node
    fields:
      node: { type: string }
      risk_level:
        type: RiskLevel
        required: false

  ChatStreamFinalEvent:
    type: object
    required:
      - thread_id
      - message_id
      - assistant_message_id
      - assistant_text
      - risk_level
      - intent
      - suggested_actions
      - session_summary
      - should_write_memory
    fields:
      thread_id: { type: string }
      message_id: { type: string }
      assistant_message_id: { type: string }
      assistant_text: { type: string }
      risk_level: { type: RiskLevel }
      intent: { type: string }
      suggested_actions:
        type: array
        items: { type: string }
      session_summary: { type: string }
      should_write_memory: { type: boolean }

  ChatStreamEvent:
    type: sse
    events:
      token: ChatStreamTokenEvent
      graph_update: ChatStreamGraphUpdateEvent
      final: ChatStreamFinalEvent

  MemoryItem:
    type: object
    required:
      - memory_id
      - memory_type
      - content
    fields:
      memory_id: { type: string }
      memory_type: { type: string }
      content: { type: string }

  ListMemoriesResponse:
    type: object
    required:
      - items
    fields:
      items:
        type: array
        items:
          type: MemoryItem

  UpdateMemoryRequest:
    type: object
    required:
      - content
    fields:
      content: { type: string }

  MemoryMutationResponse:
    type: object
    required:
      - status
    fields:
      memory_id:
        type: string
        required: false
      content:
        type: string
        required: false
      status: { type: string }

  StatusResponse:
    type: object
    required:
      - status
    fields:
      status: { type: string }

  MoodLogRequest:
    type: object
    required:
      - mood_score
    fields:
      mood_score:
        type: integer
        minimum: 1
        maximum: 5
      anxiety_score:
        type: integer
        required: false
        minimum: 1
        maximum: 5
      energy_score:
        type: integer
        required: false
        minimum: 1
        maximum: 5
      sleep_quality:
        type: integer
        required: false
        minimum: 1
        maximum: 5
      mood_tags:
        type: array
        required: false
        items: { type: string }
      note:
        type: string
        required: false

  MoodLogResponse:
    type: object
    required:
      - log_id
      - created_at
      - mood_score
    fields:
      log_id: { type: string }
      created_at:
        type: string
        format: date-time
      mood_score: { type: integer }

  MoodTrendQuery:
    type: object
    fields:
      range:
        type: string
        enum: [7d, 30d]
        default: 7d

  DailyMoodPoint:
    type: object
    required:
      - date
      - mood_score
      - tags
    fields:
      date:
        type: string
        format: date
      mood_score: { type: number }
      tags:
        type: array
        items: { type: string }

  MoodTrendResponse:
    type: object
    required:
      - range
      - avg_mood_score
      - top_tags
      - daily
      - summary
    fields:
      range:
        type: string
        enum: [7d, 30d]
      avg_mood_score: { type: number }
      top_tags:
        type: array
        items: { type: string }
      daily:
        type: array
        items: { $ref: DailyMoodPoint }
      summary: { type: string }

  SearchKnowledgeQuery:
    type: object
    fields:
      q:
        type: string
        required: false
      category:
        type: string
        required: false
      audience:
        type: string
        required: false

  KnowledgeSearchItem:
    type: object
    required:
      - article_id
      - slug
      - title
      - category
      - audience
      - summary_30s
      - tags
    fields:
      article_id: { type: string }
      slug: { type: string }
      title: { type: string }
      category: { type: string }
      audience: { type: string }
      summary_30s: { type: string }
      tags:
        type: array
        items: { type: string }

  KnowledgeSearchResponse:
    type: object
    required:
      - items
    fields:
      items:
        type: array
        items:
          type: KnowledgeSearchItem

  KnowledgeArticleResponse:
    type: object
    required:
      - article_id
      - slug
      - title
      - category
      - audience
      - summary_30s
      - explanation_3min
      - common_misunderstandings
      - actions
      - seek_help_when
      - source_refs
      - tags
      - updated_at
    fields:
      article_id: { type: string }
      slug: { type: string }
      title: { type: string }
      category: { type: string }
      audience: { type: string }
      summary_30s: { type: string }
      explanation_3min: { type: string }
      advanced_text:
        type: string
        required: false
      common_misunderstandings:
        type: array
        items: { type: string }
      actions:
        type: array
        items: { type: string }
      seek_help_when:
        type: array
        items: { type: string }
      source_refs:
        type: array
        items: { type: object }
      tags:
        type: array
        items: { type: string }
      updated_at:
        type: string
        format: date-time

  AskKnowledgeRequest:
    type: object
    required:
      - question
    fields:
      question: { type: string }
      use_my_context:
        type: boolean
        required: false
      thread_id:
        type: string
        required: false

  KnowledgeAnswer:
    type: object
    required:
      - summary_30s
      - explanation_3min
      - actions
      - seek_help_when
    fields:
      summary_30s: { type: string }
      explanation_3min: { type: string }
      actions:
        type: array
        items: { type: string }
      seek_help_when:
        type: array
        items: { type: string }

  AskKnowledgeResponse:
    type: object
    required:
      - answer
      - related_articles
      - coverage_status
      - confidence
      - source_refs
      - continue_chat_payload
      - risk_level
    fields:
      answer: { type: KnowledgeAnswer }
      related_articles:
        type: array
        items:
          type: KnowledgeSearchItem
      coverage_status:
        type: enum
        values:
          - sufficient
          - partial
          - insufficient
      confidence:
        type: enum
        values:
          - high
          - medium
          - low
      source_refs:
        type: array
        items:
          type: KnowledgeSourceRef
      gap_id:
        type: string
        required: false
      continue_chat_payload:
        type: object
      risk_level: { type: RiskLevel }

  KnowledgeSourceRef:
    type: object
    required:
      - source_name
      - article_id
      - article_title
    fields:
      source_name: { type: string }
      source_url:
        type: string
        required: false
      license:
        type: string
        required: false
      article_id: { type: string }
      article_title: { type: string }
      chunk_id:
        type: string
        required: false
      chunk_index:
        type: number
        required: false
      score:
        type: number
        required: false

  KnowledgeGapQuery:
    type: object
    fields:
      status:
        type: string
        required: false
        default: open
      limit:
        type: number
        required: false
        default: 50

  KnowledgeGapItem:
    type: object
    required:
      - gap_id
      - question
      - coverage_status
      - confidence
      - top_score
      - status
      - hit_count
      - source_refs
      - created_at
      - updated_at
    fields:
      gap_id: { type: string }
      question: { type: string }
      category:
        type: string
        required: false
      audience:
        type: string
        required: false
      coverage_status: { type: string }
      confidence: { type: string }
      top_score: { type: number }
      status: { type: string }
      hit_count: { type: number }
      source_refs:
        type: array
        items: { type: object }
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      resolved_at:
        type: string
        format: date-time
        required: false

  KnowledgeGapListResponse:
    type: object
    required:
      - items
    fields:
      items:
        type: array
        items:
          type: KnowledgeGapItem

  ResolveKnowledgeGapRequest:
    type: object
    fields:
      article_id:
        type: string
        required: false
      reviewer_note:
        type: string
        required: false

  KnowledgeGapMutationResponse:
    type: object
    required:
      - gap_id
      - status
    fields:
      gap_id: { type: string }
      status: { type: string }

  GetSafetyResourcesQuery:
    type: object
    fields:
      region:
        type: string
        required: false
        default: CN
      audience:
        type: SafetyAudience
        required: false
        default: all

  SafetyResourceItem:
    type: object
    required:
      - resource_type
      - title
      - description
    fields:
      resource_type: { type: string }
      title: { type: string }
      description: { type: string }

  SafetyResourcesResponse:
    type: object
    required:
      - region
      - audience
      - items
    fields:
      region: { type: string }
      audience: { type: SafetyAudience }
      items:
        type: array
        items:
          type: SafetyResourceItem

  CrisisEventRequest:
    type: object
    required:
      - thread_id
      - risk_level
    fields:
      thread_id: { type: string }
      message_id:
        type: string
        required: false
      risk_level: { type: RiskLevel }
      detected_signals:
        type: array
        required: false
        items: { type: string }
      action_taken:
        type: array
        required: false
        items: { type: string }

  CrisisEventResponse:
    type: object
    required:
      - event_id
      - thread_id
      - status
    fields:
      event_id: { type: string }
      thread_id: { type: string }
      status: { type: string }

integrationRules:
  - rule: 登录或注册成功后，前端必须持久化 access_token、refresh_token、user_mode。
  - rule: sendMessage 时应显式携带 user_mode，用于 teen/adult 分流。
  - rule: 当 sendMessage 返回 risk_level 为 L2 或 L3 时，前端必须展示 SOS 入口，并调用 createCrisisEvent 记录事件。
  - rule: 首页续聊能力依赖 assistant_message.session_summary，Sprint 1 没有单独的会话摘要查询接口。
  - rule: getSafetyResources 可在未登录状态下调用，便于 SOS 页面兜底展示。
  - rule: askKnowledge 返回 risk_level 为 L2 或 L3 时，前端必须停止普通知识展示路径并打开 SOS/安全提示。
  - rule: 知识结果继续聊天时，应把标题或 article_id 带入对话上下文，但不得把知识回答包装成诊断。
  - rule: streamMessage 是对话页默认发送路径；收到 graph_update 时展示节点状态和风险等级，收到 final 时展示 suggested_actions。
  - rule: streamMessage 在首个 SSE 事件前失败时回退到 sendMessage；首个事件后中断时不得重发同一输入，只刷新服务端消息。

errorHandling:
  behavior: throw-on-non-2xx
  errorShape:
    type: Error
    messageTemplate: "API {status}: {responseText}"
