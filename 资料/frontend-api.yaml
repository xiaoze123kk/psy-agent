version: 1
name: counseling-agent-frontend-sdk-contract
sprint: Sprint 3 MVP closeout
description: |
  心理咨询 Agent 前端 API 契约。

  目标是支撑如下前端闭环：
  登录/注册 -> 年龄模式落库 -> 首页情绪记录、趋势与周小结 -> 文本聊天 -> 语音 MVP -> 高风险时展示 SOS -> 记忆中心 -> 知识库搜索/详情/问答 -> 测试中心与结果回流对话 -> 分享卡与反馈。

  Sprint 3 语音能力为文本模拟语音 MVP，仅验证协议、状态流转和安全分流；
  不包含真 ASR/TTS/WebRTC、动漫人物测试 Beta、完整 RAG。

client:
  className: CounselingApi
  sourceFile: frontend/src/api/endpoints.ts
  framework:
    name: vue
    version: 3
    buildTool: vite
    language: TypeScript
  transport:
    protocol: http
    implementation: fetch
  auth:
    type: bearer-token
    tokenProvider: ApiClient.getAccessToken
    attachToMethods:
      - getCurrentUser
      - startThread
      - sendMessage
      - listMemories
      - updateMemory
      - deleteMemory
      - clearMemories
      - updateSettings
      - createMoodLog
      - getMoodTrend
      - getWeeklyMoodSummary
      - createVoiceSession
      - connectVoiceSession
      - submitFeedback
      - getPrivacySummary
      - exportPersonalData
      - deletePersonalData
      - deleteAccount
      - searchKnowledge
      - getKnowledgeArticle
      - askKnowledge
      - listKnowledgeGaps
      - resolveKnowledgeGap
      - listTests
      - getTest
      - startAttempt
      - submitAnswer
      - completeAttempt
      - getTestHistory
      - getAttemptResult
      - createCrisisEvent
    note: 当前后端脚手架尚未强制校验 token，但联调时前端仍应按正式 Bearer 方式传递。
  baseUrl:
    example: http://localhost:8000
  basePath: /api/v1

scope:
  included:
    - auth
    - chat
    - memory
    - mood
    - safety
    - knowledge
    - tests
    - voice
    - feedback
    - privacy
  excluded:
    - true-audio-asr-tts
    - anime-character-test
    - full-rag

implementationStatus:
  currentSdkImplementedMethods:
    - startThread
    - sendMessage
    - streamMessage
    - listMemories
    - createMoodLog
    - getMoodTrend
    - searchKnowledge
    - getKnowledgeArticle
    - askKnowledge
    - listKnowledgeGaps
    - resolveKnowledgeGap
    - listTests
    - getTest
    - startAttempt
    - submitAnswer
    - completeAttempt
    - getTestHistory
    - getAttemptResult
    - getPrivacySummary
    - exportPersonalData
    - deletePersonalData
    - deleteAccount
  plannedSprint3Methods:
    - getWeeklyMoodSummary
    - createVoiceSession
    - connectVoiceSession
    - submitFeedback
    - buildTestShareCard
  note: 当前 `frontend/src/api/endpoints.ts` 已实现 Sprint 2 知识库、情绪趋势、记忆中心、SSE 和测试中心所需方法。

flows:
  sprint1Demo:
    - step: register
      when: 新用户首次进入
    - step: login
      when: 已注册用户再次进入
    - step: getCurrentUser
      when: 应用恢复会话或刷新后
    - step: startThread
      when: 用户点击“我想倾诉”
    - step: sendMessage
      when: 对话页发送文本消息
    - step: createCrisisEvent
      when: sendMessage 返回 risk_level 为 L2 或 L3
    - step: getSafetyResources
      when: 需要展示 SOS 页面或安全资源卡片
    - step: listMemories
      when: 我的页查看基础记忆
    - step: createMoodLog
      when: 用户完成基础情绪记录
    - step: getMoodTrend
      when: 首页展示 7 天或 30 天趋势
    - step: getWeeklyMoodSummary
      when: 首页或我的页展示近 7 天情绪小结
    - step: createVoiceSession
      when: 用户从首页或对话页进入语音 MVP
    - step: connectVoiceSession
      when: createVoiceSession 返回 ws_url 后建立文本模拟语音通道
    - step: searchKnowledge
      when: 用户进入知识页或搜索主题
    - step: getKnowledgeArticle
      when: 用户打开知识详情
    - step: askKnowledge
      when: 用户围绕知识主题继续提问
    - step: listTests
      when: 用户进入测试中心
    - step: getTest
      when: 用户选择今日状态测试或 16 型人格风格测试
    - step: startAttempt
      when: 登录用户开始作答
    - step: submitAnswer
      when: 用户逐题提交答案
    - step: completeAttempt
      when: 用户完成全部题目并查看结果
    - step: buildTestShareCard
      when: 测试结果页生成可分享文字卡片
    - step: submitFeedback
      when: 用户对 AI 回复、知识答案或测试结果评分
    - step: getTestHistory
      when: 用户查看历史测试结果

methods:
  - methodName: register
    summary: 用户注册并返回 token 与 user_mode
    requestType: RegisterRequest
    responseType: RegisterResponse
    authRequired: false
    uiEntry:
      - 登录/注册页
      - 年龄确认页
    http:
      method: POST
      path: /api/v1/auth/register

  - methodName: login
    summary: 用户登录
    requestType: LoginRequest
    responseType: LoginResponse
    authRequired: false
    uiEntry:
      - 登录/注册页
    http:
      method: POST
      path: /api/v1/auth/login

  - methodName: getCurrentUser
    summary: 获取当前登录用户信息
    requestType: none
    responseType: CurrentUserResponse
    authRequired: true
    uiEntry:
      - 启动页
      - 首页
      - 我的页
    http:
      method: GET
      path: /api/v1/auth/me

  - methodName: startThread
    summary: 创建文本聊天线程
    requestType: StartThreadRequest
    responseType: StartThreadResponse
    authRequired: true
    uiEntry:
      - 首页
    http:
      method: POST
      path: /api/v1/chat/threads

  - methodName: sendMessage
    summary: 发送用户文本消息并获取助手回复
    requestType: SendMessageRequest
    responseType: SendMessageResponse
    authRequired: true
    pathParams:
      - name: threadId
        mapsTo: thread_id
        type: string
    uiEntry:
      - 对话页
    http:
      method: POST
      pathTemplate: /api/v1/chat/threads/{thread_id}/messages

  - methodName: streamMessage
    summary: 流式发送用户消息并逐步接收助手回复
    requestType: SendMessageRequest
    responseType: ChatStreamEvent
    authRequired: true
    pathParams:
      - name: threadId
        mapsTo: thread_id
        type: string
    uiEntry:
      - 对话页
    http:
      method: POST
      pathTemplate: /api/v1/chat/threads/{thread_id}/stream
      responseContentType: text/event-stream
    events:
      - event: accepted
        schema: ChatStreamAcceptedEvent
      - event: graph_update
        schema: ChatStreamGraphUpdateEvent
      - event: heartbeat
        schema: ChatStreamHeartbeatEvent
      - event: token
        schema: ChatStreamTokenEvent
      - event: final
        schema: ChatStreamFinalEvent
      - event: error
        schema: ChatStreamErrorEvent
    fallback:
      beforeFirstEvent: call sendMessage with the same payload, including client_message_id, and fill the current assistant bubble
      afterFirstEvent: do not resend; refresh thread messages from the server

  - methodName: listMemories
    summary: 获取记忆列表
    requestType: none
    responseType: ListMemoriesResponse
    authRequired: true
    uiEntry:
      - 我的页
    http:
      method: GET
      path: /api/v1/memories

  - methodName: updateMemory
    summary: 修改单条记忆
    requestType: UpdateMemoryRequest
    responseType: MemoryMutationResponse
    authRequired: true
    pathParams:
      - name: memoryId
        mapsTo: memory_id
        type: string
    uiEntry:
      - 我的页
    http:
      method: PATCH
      pathTemplate: /api/v1/memories/{memory_id}

  - methodName: deleteMemory
    summary: 删除单条记忆
    requestType: none
    responseType: MemoryMutationResponse
    authRequired: true
    pathParams:
      - name: memoryId
        mapsTo: memory_id
        type: string
    uiEntry:
      - 我的页
    http:
      method: DELETE
      pathTemplate: /api/v1/memories/{memory_id}

  - methodName: clearMemories
    summary: 清空全部记忆
    requestType: none
    responseType: StatusResponse
    authRequired: true
    uiEntry:
      - 我的页
    http:
      method: DELETE
      path: /api/v1/memories

  - methodName: updateSettings
    summary: 更新当前用户设置
    requestType: UserSettingsUpdateRequest
    responseType: UserSettingsResponse
    authRequired: true
    uiEntry:
      - 我的页
      - 记忆中心
    http:
      method: PATCH
      path: /api/v1/me/settings

  - methodName: getPrivacySummary
    summary: 获取当前用户隐私设置与个人数据数量总览
    requestType: none
    responseType: PrivacySummaryResponse
    authRequired: true
    uiEntry:
      - 我的页
      - 隐私与数据
    http:
      method: GET
      path: /api/v1/me/privacy-summary

  - methodName: exportPersonalData
    summary: 导出当前用户个人数据 JSON
    requestType: none
    responseType: PersonalDataExport
    authRequired: true
    uiEntry:
      - 我的页
      - 隐私与数据
    http:
      method: GET
      path: /api/v1/me/data-export?format=json

  - methodName: deletePersonalData
    summary: 按范围清除当前用户个人数据
    requestType: DataDeleteRequest
    responseType: PrivacyMutationResponse
    authRequired: true
    uiEntry:
      - 我的页
      - 隐私与数据
    http:
      method: DELETE
      path: /api/v1/me/data

  - methodName: deleteAccount
    summary: 注销当前账号并撤销 refresh token
    requestType: AccountDeleteRequest
    responseType: PrivacyMutationResponse
    authRequired: true
    uiEntry:
      - 我的页
      - 隐私与数据
    http:
      method: DELETE
      path: /api/v1/me/account

  - methodName: createMoodLog
    summary: 提交基础情绪记录
    requestType: MoodLogRequest
    responseType: MoodLogResponse
    authRequired: true
    uiEntry:
      - 首页
      - 情绪 check-in 表单
    http:
      method: POST
      path: /api/v1/moods

  - methodName: getMoodTrend
    summary: 获取 7 天或 30 天情绪趋势
    requestType: MoodTrendQuery
    responseType: MoodTrendResponse
    authRequired: true
    uiEntry:
      - 首页趋势卡片
    http:
      method: GET
      path: /api/v1/moods/trends?range={range}

  - methodName: getWeeklyMoodSummary
    summary: 获取近 7 天情绪小结
    requestType: none
    responseType: WeeklyMoodSummaryResponse
    authRequired: true
    uiEntry:
      - 首页周小结卡片
      - 我的页情绪回顾
    http:
      method: GET
      path: /api/v1/moods/weekly-summary

  - methodName: createVoiceSession
    summary: 创建语音 MVP 会话
    requestType: CreateVoiceSessionRequest
    responseType: CreateVoiceSessionResponse
    authRequired: true
    uiEntry:
      - 首页语音入口
      - 对话页语音入口
    http:
      method: POST
      path: /api/v1/voice/sessions

  - methodName: connectVoiceSession
    summary: 连接文本模拟语音 WebSocket
    requestType: VoiceSessionConnectionRequest
    responseType: VoiceSessionWebSocketEvent
    authRequired: true
    uiEntry:
      - 语音 MVP 页面
    websocket:
      pathTemplate: /api/v1/voice/sessions/{voice_session_id}/ws
      protocol: text-simulated-voice-v1

  - methodName: submitFeedback
    summary: 提交内容评分反馈
    requestType: FeedbackRequest
    responseType: FeedbackResponse
    authRequired: true
    uiEntry:
      - 对话页 AI 回复
      - 知识问答答案
      - 测试结果页
    http:
      method: POST
      path: /api/v1/feedback

  - methodName: searchKnowledge
    summary: 搜索知识库文章
    requestType: SearchKnowledgeQuery
    responseType: KnowledgeSearchResponse
    authRequired: false
    uiEntry:
      - 知识页
    http:
      method: GET
      path: /api/v1/knowledge/search

  - methodName: getKnowledgeArticle
    summary: 获取知识文章详情
    requestType: none
    responseType: KnowledgeArticleResponse
    authRequired: false
    pathParams:
      - name: articleId
        mapsTo: article_id
        type: string
    uiEntry:
      - 知识页
    http:
      method: GET
      pathTemplate: /api/v1/knowledge/articles/{article_id}

  - methodName: askKnowledge
    summary: 围绕知识库做结构化问答
    requestType: AskKnowledgeRequest
    responseType: AskKnowledgeResponse
    authRequired: false
    uiEntry:
      - 知识页
      - 对话页知识上下文入口
    http:
      method: POST
      path: /api/v1/knowledge/ask

  - methodName: listTests
    summary: 获取测试列表
    requestType: none
    responseType: TestListResponse
    authRequired: false
    uiEntry:
      - 测试页
    http:
      method: GET
      path: /api/v1/tests

  - methodName: getTest
    summary: 获取测试题目和选项
    requestType: none
    responseType: TestDetailResponse
    authRequired: false
    pathParams:
      - name: testId
        mapsTo: test_id
        type: string
    uiEntry:
      - 测试答题页
    http:
      method: GET
      pathTemplate: /api/v1/tests/{test_id}

  - methodName: startAttempt
    summary: 创建测试作答 attempt
    requestType: none
    responseType: StartAttemptResponse
    authRequired: true
    pathParams:
      - name: testId
        mapsTo: test_id
        type: string
    uiEntry:
      - 测试答题页
    http:
      method: POST
      pathTemplate: /api/v1/tests/{test_id}/attempts

  - methodName: submitAnswer
    summary: 提交单题答案
    requestType: SubmitAnswerRequest
    responseType: AnswerResponse
    authRequired: true
    pathParams:
      - name: attemptId
        mapsTo: attempt_id
        type: string
    uiEntry:
      - 测试答题页
    http:
      method: POST
      pathTemplate: /api/v1/tests/attempts/{attempt_id}/answers

  - methodName: completeAttempt
    summary: 完成测试并生成结果
    requestType: none
    responseType: CompleteAttemptResponse
    authRequired: true
    pathParams:
      - name: attemptId
        mapsTo: attempt_id
        type: string
    uiEntry:
      - 测试结果页
    http:
      method: POST
      pathTemplate: /api/v1/tests/attempts/{attempt_id}/complete

  - methodName: buildTestShareCard
    summary: 基于测试结果本地生成分享卡
    requestType: CompleteAttemptResponse
    responseType: TestShareCardPayload
    authRequired: false
    localOnly: true
    uiEntry:
      - 测试结果页
    note: 仅生成文字/HTML/CSS 分享卡 payload，不调用后端，不使用第三方图片或未授权素材。

  - methodName: getTestHistory
    summary: 获取用户测试历史
    requestType: none
    responseType: TestHistoryResponse
    authRequired: true
    uiEntry:
      - 测试历史页
    http:
      method: GET
      path: /api/v1/tests/history

  - methodName: getAttemptResult
    summary: 查询已完成 attempt 的结果
    requestType: none
    responseType: CompleteAttemptResponse
    authRequired: true
    pathParams:
      - name: attemptId
        mapsTo: attempt_id
        type: string
    uiEntry:
      - 测试历史页
      - 测试结果页
    http:
      method: GET
      pathTemplate: /api/v1/tests/attempts/{attempt_id}/result

  - methodName: listKnowledgeGaps
    summary: 查看知识库待补充问题
    requestType: KnowledgeGapQuery
    responseType: KnowledgeGapListResponse
    authRequired: false
    query:
      - name: status
        type: string
        required: false
        default: open
      - name: limit
        type: number
        required: false
        default: 50
    uiEntry:
      - 后台知识审核页
    http:
      method: GET
      path: /api/v1/knowledge/gaps

  - methodName: resolveKnowledgeGap
    summary: 人工补内容后标记知识缺口已解决
    requestType: ResolveKnowledgeGapRequest
    responseType: KnowledgeGapMutationResponse
    authRequired: false
    pathParams:
      - name: gapId
        mapsTo: gap_id
        type: string
    uiEntry:
      - 后台知识审核页
    http:
      method: POST
      pathTemplate: /api/v1/knowledge/gaps/{gap_id}/resolve

  - methodName: getSafetyResources
    summary: 获取 SOS 资源列表
    requestType: GetSafetyResourcesQuery
    responseType: SafetyResourcesResponse
    authRequired: false
    query:
      - name: region
        type: string
        required: false
        default: CN
      - name: audience
        type: SafetyAudience
        required: false
        default: all
    uiEntry:
      - SOS 页面
      - 对话页高风险卡片
    http:
      method: GET
      path: /api/v1/safety/resources

  - methodName: createCrisisEvent
    summary: 记录高风险危机事件
    requestType: CrisisEventRequest
    responseType: CrisisEventResponse
    authRequired: true
    uiEntry:
      - 对话页
      - SOS 页面
    http:
      method: POST
      path: /api/v1/safety/crisis-events

types:
  AgeRange:
    type: enum
    values:
      - 13_15
      - 16_17
      - 18_plus

  UserMode:
    type: enum
    values:
      - teen
      - adult

  ThreadMode:
    type: enum
    values:
      - companion
      - knowledge
      - test
      - crisis
    note: Sprint 1 页面流只使用 companion，其余值保留字段兼容性。

  InputType:
    type: enum
    values:
      - text
      - voice
      - test
      - system

  RiskLevel:
    type: enum
    values:
      - L0
      - L1
      - L2
      - L3

  TurnStatus:
    type: enum
    values:
      - accepted
      - running
      - completed
      - failed

  DeliveryStatus:
    type: enum
    values:
      - generated
      - failed_no_reply
      - safety_fallback

  MemoryJobStatus:
    type: enum
    values:
      - pending
      - running
      - completed
      - failed
      - skipped

  MemoryMode:
    type: enum
    values:
      - off
      - summary_only
      - long_term

  SafetyAudience:
    type: enum
    values:
      - all
      - teen
      - adult

  RegisterRequest:
    type: object
    required:
      - email
      - password
      - age_range
    fields:
      email:
        type: string
        format: email
      password:
        type: string
      age_range:
        type: AgeRange

  RegisterResponse:
    type: object
    required:
      - user_id
      - access_token
      - refresh_token
      - user_mode
      - onboarding_completed
    fields:
      user_id: { type: string }
      access_token: { type: string }
      refresh_token: { type: string }
      user_mode: { type: UserMode }
      onboarding_completed: { type: boolean }

  LoginRequest:
    type: object
    required:
      - email
      - password
    fields:
      email:
        type: string
        format: email
      password: { type: string }

  LoginResponse:
    type: object
    required:
      - access_token
      - refresh_token
    fields:
      access_token: { type: string }
      refresh_token: { type: string }

  CurrentUserResponse:
    type: object
    required:
      - user_id
      - username
      - nickname
      - age_range
      - user_mode
      - usage_goals
      - onboarding_completed
      - memory_mode
      - companion_style
      - voice_enabled
      - save_voice_audio
      - save_transcript
    fields:
      user_id: { type: string }
      username: { type: string }
      nickname: { type: string }
      age_range: { type: AgeRange }
      user_mode: { type: UserMode }
      usage_goals:
        type: array
        items: { type: string }
      onboarding_completed: { type: boolean }
      memory_mode: { type: MemoryMode }
      companion_style: { type: string }
      voice_enabled: { type: boolean }
      save_voice_audio: { type: boolean }
      save_transcript: { type: boolean }

  UserSettingsUpdateRequest:
    type: object
    fields:
      memory_mode:
        type: MemoryMode
        required: false
      companion_style:
        type: string
        required: false
      voice_enabled:
        type: boolean
        required: false
      save_voice_audio:
        type: boolean
        required: false
      save_transcript:
        type: boolean
        required: false

  UserSettingsResponse:
    type: object
    required:
      - memory_mode
      - companion_style
      - voice_enabled
      - save_voice_audio
      - save_transcript
    fields:
      memory_mode: { type: MemoryMode }
      companion_style: { type: string }
      voice_enabled: { type: boolean }
      save_voice_audio: { type: boolean }
      save_transcript: { type: boolean }

  PrivacyDataScope:
    type: enum
    values:
      - memories
      - chat
      - moods
      - feedback
      - voice
      - all_non_account

  PrivacyDataCounts:
    type: object
    required:
      - memories
      - chat_threads
      - chat_messages
      - mood_logs
      - test_history
      - feedback
      - voice_sessions
      - risk_events
    fields:
      memories: { type: number }
      chat_threads: { type: number }
      chat_messages: { type: number }
      mood_logs: { type: number }
      test_history: { type: number }
      feedback: { type: number }
      voice_sessions: { type: number }
      risk_events: { type: number }

  PrivacySettingsSnapshot:
    type: object
    required:
      - memory_mode
      - companion_style
      - voice_enabled
      - save_voice_audio
      - save_transcript
    fields:
      memory_mode: { type: MemoryMode }
      companion_style: { type: string }
      voice_enabled: { type: boolean }
      save_voice_audio: { type: boolean }
      save_transcript: { type: boolean }

  PrivacySummaryResponse:
    type: object
    required:
      - user_mode
      - settings
      - counts
      - latest_updated_at
    fields:
      user_mode: { type: UserMode }
      settings: { type: PrivacySettingsSnapshot }
      counts: { type: PrivacyDataCounts }
      latest_updated_at:
        type: string
        format: date-time
        nullable: true

  DataDeleteRequest:
    type: object
    required:
      - scope
    fields:
      scope: { type: PrivacyDataScope }

  AccountDeleteRequest:
    type: object
    required:
      - confirmation
    fields:
      confirmation:
        type: enum
        values:
          - DELETE

  PrivacyMutationResponse:
    type: object
    required:
      - status
      - affected_counts
    fields:
      status: { type: string }
      scope:
        type: string
        required: false
      affected_counts:
        type: object
