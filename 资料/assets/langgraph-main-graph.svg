<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #475569; }
      .lane-label { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #334155; }
      .node-title { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .node-note { font: 400 13px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #475569; }
      .edge { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); }
      .edge-label { font: 700 12px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #334155; }
      .phase { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .input { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 14; }
      .risk { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 14; }
      .control { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 14; }
      .rag { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 14; }
      .response { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 14; }
      .validator { fill: #fae8ff; stroke: #c026d3; stroke-width: 2; rx: 14; }
      .memory { fill: #e2e8f0; stroke: #475569; stroke-width: 2; rx: 14; }
      .end { fill: #f1f5f9; stroke: #0f172a; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="950"/>
  <text class="title" x="64" y="62">心理咨询 Agent 主 LangGraph 节点图</text>
  <text class="subtitle" x="64" y="92">从用户输入到风险控制、RAG、回复生成、体验校验、摘要与记忆写入的一轮对话流程</text>

  <rect class="phase" x="40" y="130" width="260" height="685"/>
  <text class="lane-label" x="64" y="164">1. 输入与上下文</text>

  <rect class="phase" x="330" y="130" width="260" height="685"/>
  <text class="lane-label" x="354" y="164">2. 风险与控制面</text>

  <rect class="phase" x="620" y="130" width="260" height="685"/>
  <text class="lane-label" x="644" y="164">3. 意图与 RAG</text>

  <rect class="phase" x="910" y="130" width="260" height="685"/>
  <text class="lane-label" x="934" y="164">4. 回复生成</text>

  <rect class="phase" x="1200" y="130" width="260" height="685"/>
  <text class="lane-label" x="1224" y="164">5. 校验与记忆</text>

  <rect class="input" x="82" y="210" width="176" height="78"/>
  <text class="node-title" x="112" y="240">START</text>
  <text class="node-note" x="105" y="263">API 构造 AgentState</text>

  <rect class="input" x="82" y="330" width="176" height="78"/>
  <text class="node-title" x="103" y="360">normalize_input</text>
  <text class="node-note" x="101" y="383">清洗文本 / 输入类型</text>

  <rect class="input" x="82" y="450" width="176" height="78"/>
  <text class="node-title" x="99" y="480">load_user_profile</text>
  <text class="node-note" x="107" y="503">加载用户模式与偏好</text>

  <rect class="risk" x="372" y="300" width="176" height="78"/>
  <text class="node-title" x="399" y="330">risk_classifier</text>
  <text class="node-note" x="397" y="353">L0-L3 / 风险语义</text>

  <rect class="control" x="372" y="450" width="176" height="78"/>
  <text class="node-title" x="408" y="480">control_plane</text>
  <text class="node-note" x="392" y="503">优先级 / 边界 / 澄清</text>

  <rect class="rag" x="662" y="300" width="176" height="78"/>
  <text class="node-title" x="690" y="330">intent_classifier</text>
  <text class="node-note" x="692" y="353">vent / soothe / counseling</text>

  <rect class="rag" x="662" y="450" width="176" height="78"/>
  <text class="node-title" x="688" y="480">example_retriever</text>
  <text class="node-note" x="688" y="503">咨询语料召回与重排</text>

  <rect class="response" x="952" y="190" width="176" height="66"/>
  <text class="node-title" x="990" y="220">crisis_response</text>
  <text class="node-note" x="989" y="242">危机安全回复</text>

  <rect class="response" x="952" y="275" width="176" height="66"/>
  <text class="node-title" x="964" y="305">clinical_red_flag</text>
  <text class="node-note" x="988" y="327">临床红旗转介</text>

  <rect class="response" x="952" y="360" width="176" height="66"/>
  <text class="node-title" x="974" y="390">boundary_response</text>
  <text class="node-note" x="995" y="412">边界与系统保护</text>

  <rect class="response" x="952" y="445" width="176" height="66"/>
  <text class="node-title" x="958" y="475">clarification_response</text>
  <text class="node-note" x="997" y="497">信息不足时澄清</text>

  <rect class="response" x="952" y="530" width="176" height="66"/>
  <text class="node-title" x="976" y="560">soothing_response</text>
  <text class="node-note" x="1000" y="582">安抚与稳定</text>

  <rect class="response" x="952" y="615" width="176" height="66"/>
  <text class="node-title" x="966" y="645">counseling_response</text>
  <text class="node-note" x="999" y="667">轻咨询回应</text>

  <rect class="response" x="952" y="700" width="176" height="66"/>
  <text class="node-title" x="966" y="730">companion_response</text>
  <text class="node-note" x="996" y="752">普通陪伴聊天</text>

  <rect class="validator" x="1242" y="360" width="176" height="78"/>
  <text class="node-title" x="1267" y="390">response_validator</text>
  <text class="node-note" x="1268" y="413">安全 + 体验校验</text>

  <rect class="memory" x="1242" y="485" width="176" height="78"/>
  <text class="node-title" x="1287" y="515">summarize_turn</text>
  <text class="node-note" x="1280" y="538">本轮摘要 / digest</text>

  <rect class="memory" x="1242" y="610" width="176" height="78"/>
  <text class="node-title" x="1256" y="640">memory_candidate</text>
  <text class="node-note" x="1270" y="663">提取可写记忆候选</text>

  <rect class="memory" x="1114" y="760" width="150" height="66"/>
  <text class="node-title" x="1141" y="790">write_memory</text>
  <text class="node-note" x="1141" y="812">写入长期记忆</text>

  <rect class="memory" x="1344" y="760" width="150" height="66"/>
  <text class="node-title" x="1375" y="790">skip_memory</text>
  <text class="node-note" x="1378" y="812">跳过写入</text>

  <rect class="end" x="1242" y="865" width="176" height="48"/>
  <text class="node-title" x="1307" y="896">END</text>

  <path class="edge" d="M170 288 L170 330"/>
  <path class="edge" d="M170 408 L170 450"/>
