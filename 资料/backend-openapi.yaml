openapi: 3.1.0
info:
  title: Counseling Agent Backend API
  version: 1.0.0-sprint1
  description: |
    心理咨询 Agent Sprint 1 后端接口文档。

    本文档只覆盖 Sprint 1 明确交付的闭环接口：
    鉴权、文本对话、记忆管理、情绪记录、安全资源与危机事件。

    以下脚手架或后续 Sprint 占位能力不纳入本次正式契约：
    knowledge、tests、voice、SSE stream、mood trends。
servers:
  - url: http://localhost:8000
    description: 本地开发环境
tags:
  - name: health
    description: 服务可用性检查
  - name: system
    description: API 根路径与联调入口
  - name: auth
    description: 注册、登录、获取当前用户
  - name: chat
    description: 创建会话、发送文本消息
  - name: memory
    description: 记忆列表与基础维护
  - name: mood
    description: 基础情绪记录
  - name: safety
    description: SOS 资源与危机事件记录
paths:
  /health:
    get:
      tags: [health]
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

  /api/v1:
    get:
      tags: [system]
      summary: API 根路径
      operationId: apiRoot
      responses:
        "200":
          description: API 版本信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRootResponse"
              example:
                message: Counseling Agent API v1

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: 注册
      operationId: register
      description: |
        Sprint 1 注册接口。
        后端依据 `age_range` 推导 `user_mode`：
        `13_15`、`16_17` -> `teen`，其余 -> `adult`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: demo@example.com
              password: "12345678"
              age_range: 16_17
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              example:
                user_id: 8b6f8d6f-8b4a-4cf0-b7b1-7d41ea4d2a19
                access_token: replace-with-real-jwt
                refresh_token: replace-with-real-refresh-token
                user_mode: teen
                onboarding_completed: false
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: demo@example.com
              password: "12345678"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                access_token: replace-with-real-jwt
                refresh_token: replace-with-real-refresh-token
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: 获取当前用户
      operationId: getCurrentUser
      description: |
        Sprint 1 联调期应携带 Bearer Token。
        当前脚手架暂未校验 Authorization 头，但前后端联调仍按正式鉴权方式传递。
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 当前用户基础信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
              example:
                user_id: demo-user
                nickname: demo
                user_mode: adult

  /api/v1/chat/threads:
    post:
      tags: [chat]
      summary: 创建会话
      operationId: createThread
      description: 创建 Sprint 1 文本聊天线程。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartThreadRequest"
            example:
              mode: companion
              title: 我想倾诉
      responses:
        "200":
          description: 会话创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartThreadResponse"
              example:
                thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                langgraph_thread_id: lg-0f8fad5b-d9cb-469f-a165-70867728950e
                mode: companion
                title: 我想倾诉
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/chat/threads/{thread_id}/messages:
    post:
      tags: [chat]
      summary: 发送消息
      operationId: sendMessage
      description: |
        向指定会话发送一条文本消息，并同步返回 LangGraph 编排后的助手回复。
        当前 Sprint 1 仅要求单次请求-响应模式，不包含流式返回。
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          description: 会话 ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            examples:
              empathy:
                summary: 普通倾诉场景
                value:
                  user_id: demo-user
                  content: 我最近压力好大，感觉没人理解我
                  input_type: text
                  user_mode: teen
              crisis:
                summary: 高风险场景
                value:
                  user_id: demo-user
                  content: 我真的不想活了
                  input_type: text
                  user_mode: teen
      responses:
        "200":
          description: 助手回复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
              examples:
                empathy:
                  summary: 普通共情回复
                  value:
                    thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                    assistant_message:
                      assistant_text: I hear you. Thank you for sharing this. We can go slowly and focus on what feels hardest right now.
                      risk_level: L1
                      intent: vent
                      suggested_actions:
                        - continue
                        - summarize
                        - gentle advice
                      session_summary: topic=我最近压力好大，感觉没人理解我 risk=L1
                      should_write_memory: true
                crisis:
                  summary: 高风险安全分流回复
                  value:
                    thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                    assistant_message:
                      assistant_text: Your safety matters most right now. I want you to contact a trusted person immediately and use local emergency resources.
                      risk_level: L2
                      intent: other
                      suggested_actions:
                        - contact trusted person
                        - open SOS
                        - local emergency
                      session_summary: topic=我真的不想活了 risk=L2
                      should_write_memory: true
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/memories:
    get:
      tags: [memory]
      summary: 获取记忆列表
      operationId: listMemories
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 记忆列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMemoriesResponse"
              example:
                items:
                  - memory_id: demo-memory-1
                    memory_type: preference
                    content: Prefers gentle responses.
    delete:
      tags: [memory]
      summary: 清空全部记忆
      operationId: clearMemories
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 清空结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: cleared

  /api/v1/memories/{memory_id}:
    patch:
      tags: [memory]
      summary: 修改单条记忆
      operationId: updateMemory
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoryRequest"
            example:
              content: 用户更偏好简短、温柔的回复
      responses:
        "200":
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryMutationResponse"
              example:
                memory_id: demo-memory-1
                content: 用户更偏好简短、温柔的回复
                status: updated
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [memory]
      summary: 删除单条记忆
      operationId: deleteMemory
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryMutationResponse"
              example:
                memory_id: demo-memory-1
                status: deleted

  /api/v1/moods:
    post:
      tags: [mood]
      summary: 新增情绪记录
      operationId: createMoodLog
      description: Sprint 1 仅提供基础打点能力，不包含趋势可视化接口。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoodLogRequest"
            example:
              mood_score: 2
              anxiety_score: 4
              energy_score: 2
              sleep_quality: 2
              mood_tags:
                - anxious
                - tired
              note: 今天临近考试，整个人很紧绷
      responses:
        "200":
          description: 记录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodLogResponse"
              example:
                log_id: demo-log-id
                created_at: "2026-04-24T12:00:00Z"
                mood_score: 2
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/safety/resources:
    get:
      tags: [safety]
      summary: 获取 SOS 资源
      operationId: getSafetyResources
      description: 高风险场景下前端可直接调用，用于渲染 SOS 页面或紧急引导卡片。
      parameters:
        - in: query
          name: region
          required: false
          schema:
            type: string
            default: CN
          description: 资源地域代码
        - in: query
          name: audience
          required: false
          schema:
            $ref: "#/components/schemas/SafetyAudience"
          description: 资源面向人群
      responses:
        "200":
          description: SOS 资源列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyResourcesResponse"
              example:
                region: CN
                audience: teen
                items:
                  - resource_type: trusted_adult
                    title: 联系可信任的大人
                    description: 先联系家长、老师或其他你信任的成年人
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/safety/crisis-events:
    post:
      tags: [safety]
      summary: 记录危机事件
      operationId: createCrisisEvent
      description: |
        当前端收到 `risk_level` 为 `L2` 或 `L3` 的回复时，应调用该接口记录危机事件，
        供 Sprint 1 Demo 中的风险留痕与后续人工排查使用。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrisisEventRequest"
            example:
              thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
              message_id: client-msg-001
              risk_level: L2
              detected_signals:
                - 不想活了
              action_taken:
                - open SOS
                - contact trusted person
      responses:
        "200":
          description: 记录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrisisEventResponse"
              example:
                event_id: demo-crisis-event
                thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                status: recorded
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: 请求参数校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HTTPValidationError"

  schemas:
    AgeRange:
      type: string
      enum:
        - 13_15
        - 16_17
        - 18_plus
      description: 注册阶段用于推导 teen/adult 模式

    UserMode:
      type: string
      enum:
        - teen
        - adult

    ThreadMode:
      type: string
      enum:
        - companion
        - knowledge
        - test
        - crisis
      description: |
        当前 Sprint 1 正式使用 `companion` 为主；
        其余值保留字段兼容性，不代表对应能力已纳入 Sprint 1 范围。

    InputType:
      type: string
      enum:
        - text
        - voice
        - test
        - system

    RiskLevel:
      type: string
      enum:
        - L0
        - L1
        - L2
        - L3
      description: |
        L0=正常，L1=中低风险情绪波动，L2/L3=需进入安全分流。

    SafetyAudience:
      type: string
      enum:
        - all
        - teen
        - adult

    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiRootResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        age_range:
          $ref: "#/components/schemas/AgeRange"
      required:
        - email
        - password
        - age_range

    RegisterResponse:
      type: object
      properties:
        user_id:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
        user_mode:
          $ref: "#/components/schemas/UserMode"
        onboarding_completed:
          type: boolean
      required:
        - user_id
        - access_token
        - refresh_token
        - user_mode
        - onboarding_completed

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required:
        - access_token
        - refresh_token

    CurrentUserResponse:
      type: object
      properties:
        user_id:
          type: string
        nickname:
          type: string
        user_mode:
          $ref: "#/components/schemas/UserMode"
      required:
        - user_id
        - nickname
        - user_mode

    StartThreadRequest:
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/ThreadMode"
          default: companion
        title:
          type: string
      additionalProperties: false

    StartThreadResponse:
      type: object
      properties:
        thread_id:
          type: string
        langgraph_thread_id:
          type: string
        mode:
          type: string
        title:
          type: string
      required:
        - thread_id
        - langgraph_thread_id
        - mode
        - title

    SendMessageRequest:
      type: object
      properties:
        user_id:
          type: string
        content:
          type: string
        input_type:
          $ref: "#/components/schemas/InputType"
          default: text
        user_mode:
          $ref: "#/components/schemas/UserMode"
          default: adult
      required:
        - user_id
        - content

    AssistantMessage:
      type: object
      properties:
        assistant_text:
          type: string
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        intent:
          type: string
          description: LangGraph 意图识别结果
        suggested_actions:
          type: array
          items:
            type: string
        session_summary:
          type: string
          description: 当前轮对话摘要，供首页续聊展示使用
        should_write_memory:
          type: boolean
      required:
        - assistant_text
        - risk_level
        - intent
        - suggested_actions
        - session_summary
        - should_write_memory

    SendMessageResponse:
      type: object
      properties:
        thread_id:
          type: string
        assistant_message:
          $ref: "#/components/schemas/AssistantMessage"
      required:
        - thread_id
        - assistant_message

    MemoryItem:
      type: object
      properties:
        memory_id:
          type: string
        memory_type:
          type: string
        content:
          type: string
      required:
        - memory_id
        - memory_type
        - content

    ListMemoriesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryItem"
      required:
        - items

    UpdateMemoryRequest:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    MemoryMutationResponse:
      type: object
      properties:
        memory_id:
          type: string
        content:
          type: string
        status:
          type: string
      required:
        - status

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MoodLogRequest:
      type: object
      properties:
        mood_score:
          type: integer
          minimum: 1
          maximum: 5
        anxiety_score:
          type: integer
          minimum: 1
          maximum: 5
        energy_score:
          type: integer
          minimum: 1
          maximum: 5
        sleep_quality:
          type: integer
          minimum: 1
          maximum: 5
        mood_tags:
          type: array
          items:
            type: string
        note:
          type: string
      required:
        - mood_score

    MoodLogResponse:
      type: object
      properties:
        log_id:
          type: string
        created_at:
          type: string
          format: date-time
        mood_score:
          type: integer
      required:
        - log_id
        - created_at
        - mood_score

    SafetyResourceItem:
      type: object
      properties:
        resource_type:
          type: string
        title:
          type: string
        description:
          type: string
      required:
        - resource_type
        - title
        - description

    SafetyResourcesResponse:
      type: object
      properties:
        region:
          type: string
        audience:
          $ref: "#/components/schemas/SafetyAudience"
        items:
          type: array
          items:
            $ref: "#/components/schemas/SafetyResourceItem"
      required:
        - region
        - audience
        - items

    CrisisEventRequest:
      type: object
      properties:
        thread_id:
          type: string
        message_id:
          type: string
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        detected_signals:
          type: array
          items:
            type: string
        action_taken:
          type: array
          items:
            type: string
      required:
        - thread_id
        - risk_level

    CrisisEventResponse:
      type: object
      properties:
        event_id:
          type: string
        thread_id:
          type: string
        status:
          type: string
      required:
        - event_id
        - thread_id
        - status

    ValidationError:
      type: object
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string
      required:
        - loc
        - msg
        - type

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
      required:
        - detail
