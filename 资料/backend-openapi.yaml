openapi: 3.1.0
info:
  title: Counseling Agent Backend API
  version: 1.4.0-sprint3-mvp-closeout
  description: |
    心理咨询 Agent 后端接口文档。

    本文档覆盖 Sprint 1 闭环接口、Sprint 2 自助支持闭环，以及 Sprint 3 MVP 收口增量：
    鉴权、文本对话、记忆管理、情绪记录、情绪趋势、每周小结、安全资源、危机事件、知识搜索、知识详情、知识问答、测试中心、语音 MVP 与用户反馈。

    以下脚手架或后续 Sprint 占位能力不纳入本次正式契约：
    真 ASR/TTS/WebRTC、动漫人物测试 Beta、完整 RAG。
servers:
  - url: http://localhost:8000
    description: 本地开发环境
tags:
  - name: health
    description: 服务可用性检查
  - name: system
    description: API 根路径与联调入口
  - name: auth
    description: 注册、登录、获取当前用户
  - name: user
    description: 当前用户设置
  - name: privacy
    description: 隐私与个人数据管理
  - name: chat
    description: 创建会话、发送文本消息
  - name: memory
    description: 记忆列表与基础维护
  - name: mood
    description: 情绪记录、7/30 天趋势与每周小结
  - name: safety
    description: SOS 资源与危机事件记录
  - name: knowledge
    description: 知识库搜索、详情和结构化问答
  - name: tests
    description: 测试列表、答题、结果和历史记录
  - name: voice
    description: Sprint 3 文本模拟语音 MVP
  - name: feedback
    description: 内容评分和用户反馈
paths:
  /health:
    get:
      tags: [health]
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

  /api/v1:
    get:
      tags: [system]
      summary: API 根路径
      operationId: apiRoot
      responses:
        "200":
          description: API 版本信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRootResponse"
              example:
                message: Counseling Agent API v1

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: 注册
      operationId: register
      description: |
        Sprint 1 注册接口。
        后端依据 `age_range` 推导 `user_mode`：
        `13_15`、`16_17` -> `teen`，其余 -> `adult`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: demo@example.com
              password: "12345678"
              age_range: 16_17
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              example:
                user_id: 8b6f8d6f-8b4a-4cf0-b7b1-7d41ea4d2a19
                access_token: replace-with-real-jwt
                refresh_token: replace-with-real-refresh-token
                user_mode: teen
                onboarding_completed: false
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: demo@example.com
              password: "12345678"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                access_token: replace-with-real-jwt
                refresh_token: replace-with-real-refresh-token
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: 获取当前用户
      operationId: getCurrentUser
      description: |
        Sprint 1 联调期应携带 Bearer Token。
        当前脚手架暂未校验 Authorization 头，但前后端联调仍按正式鉴权方式传递。
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 当前用户基础信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
              example:
                user_id: demo-user
                nickname: demo
                user_mode: adult
                memory_mode: summary_only
                companion_style: gentle
                voice_enabled: false
                save_voice_audio: false
                save_transcript: true

  /api/v1/me/settings:
    patch:
      tags: [user]
      summary: 更新当前用户设置
      operationId: updateSettings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsUpdateRequest"
            example:
              memory_mode: long_term
              companion_style: gentle
              voice_enabled: false
              save_voice_audio: false
              save_transcript: true
      responses:
        "200":
          description: 设置更新结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettingsResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/me/privacy-summary:
    get:
      tags: [privacy]
      summary: Get current user's privacy and data summary
      operationId: getPrivacySummary
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Privacy summary with settings, counts, and latest activity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacySummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/data-export:
    get:
      tags: [privacy]
      summary: Export current user's personal data
      operationId: exportPersonalData
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [json]
            default: json
      responses:
        "200":
          description: Personal data export. Excludes password hashes, refresh tokens, system secrets, and internal safety rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalDataExport"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/data:
    delete:
      tags: [privacy]
      summary: Delete a scoped set of current user's data
      operationId: deletePersonalData
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataDeleteRequest"
      responses:
        "200":
          description: Deletion result with affected counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/me/account:
    delete:
      tags: [privacy]
      summary: Delete current account
      operationId: deleteCurrentAccount
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountDeleteRequest"
      responses:
        "200":
          description: Account deletion result. The user is soft-deleted and refresh tokens are revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/chat/threads:
    post:
      tags: [chat]
      summary: 创建会话
      operationId: createThread
      description: 创建 Sprint 1 文本聊天线程。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartThreadRequest"
            example:
              mode: companion
              title: 我想倾诉
      responses:
        "200":
          description: 会话创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartThreadResponse"
              example:
                thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                langgraph_thread_id: lg-0f8fad5b-d9cb-469f-a165-70867728950e
                mode: companion
                title: 我想倾诉
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/chat/threads/{thread_id}/messages:
    post:
      tags: [chat]
      summary: 发送消息
      operationId: sendMessage
      description: |
        向指定会话发送一条文本消息，并同步返回 LangGraph 编排后的助手回复。
        当前 Sprint 1 仅要求单次请求-响应模式，不包含流式返回。
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          description: 会话 ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            examples:
              empathy:
                summary: 普通倾诉场景
                value:
                  user_id: demo-user
                  client_message_id: 7f0b53f7-8a9b-4b18-a7ad-1b1f3bb8b9c4
                  content: 我最近压力好大，感觉没人理解我
                  input_type: text
                  user_mode: teen
              crisis:
                summary: 高风险场景
                value:
                  user_id: demo-user
                  client_message_id: 0d6eb1e4-0d24-49e7-9b42-6ca4f410eb0f
                  content: 我真的不想活了
                  input_type: text
                  user_mode: teen
      responses:
        "200":
          description: 助手回复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
              examples:
                empathy:
                  summary: 普通共情回复
                  value:
                    thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                    assistant_message:
                      assistant_text: I hear you. Thank you for sharing this. We can go slowly and focus on what feels hardest right now.
                      risk_level: L1
                      intent: vent
                      suggested_actions:
                        - continue
                        - summarize
                        - gentle advice
                      session_summary: topic=我最近压力好大，感觉没人理解我 risk=L1
                      should_write_memory: true
                crisis:
                  summary: 高风险安全分流回复
                  value:
                    thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                    assistant_message:
                      assistant_text: Your safety matters most right now. I want you to contact a trusted person immediately and use local emergency resources.
                      risk_level: L2
                      intent: other
                      suggested_actions:
                        - contact trusted person
                        - open SOS
                        - local emergency
                      session_summary: topic=我真的不想活了 risk=L2
                      should_write_memory: true
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/chat/threads/{thread_id}/stream:
    post:
      tags: [chat]
      summary: SSE 流式发送消息
      operationId: streamMessage
      description: |
        对话页默认使用该接口接收 text/event-stream。事件顺序通常为
        graph_update -> token* -> final。若首个 SSE 事件前失败，前端可回退到
        `/api/v1/chat/threads/{thread_id}/messages`；若首个事件后中断，前端不得重发同一输入，
        应刷新该 thread 的消息列表以避免重复写入。
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          description: 会话 ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: SSE 事件流
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events carrying graph_update, token, and final events.
              examples:
                stream:
                  summary: token 与最终动作
                  value: |
                    event: graph_update
                    data: {"node":"risk_classifier","risk_level":"L1"}

                    event: token
                    data: {"text":"我听到了"}

                    event: final
                    data: {"thread_id":"0f8fad5b-d9cb-469f-a165-70867728950e","message_id":"client-msg-001","assistant_message_id":"assistant-msg-001","assistant_text":"我听到了。","risk_level":"L1","intent":"vent","suggested_actions":["继续说","帮我梳理"],"session_summary":"risk=L1","should_write_memory":true}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/memories:
    get:
      tags: [memory]
      summary: 获取记忆列表
      operationId: listMemories
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 记忆列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMemoriesResponse"
              example:
                items:
                  - memory_id: demo-memory-1
                    memory_type: preference
                    content: Prefers gentle responses.
    delete:
      tags: [memory]
      summary: 清空全部记忆
      operationId: clearMemories
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 清空结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: cleared

  /api/v1/memories/{memory_id}:
    patch:
      tags: [memory]
      summary: 修改单条记忆
      operationId: updateMemory
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoryRequest"
            example:
              content: 用户更偏好简短、温柔的回复
      responses:
        "200":
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryMutationResponse"
              example:
                memory_id: demo-memory-1
                content: 用户更偏好简短、温柔的回复
                status: updated
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [memory]
      summary: 删除单条记忆
      operationId: deleteMemory
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryMutationResponse"
              example:
                memory_id: demo-memory-1
                status: deleted

  /api/v1/moods:
    post:
      tags: [mood]
      summary: 新增情绪记录
      operationId: createMoodLog
      description: Sprint 1 仅提供基础打点能力，不包含趋势可视化接口。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoodLogRequest"
            example:
              mood_score: 2
              anxiety_score: 4
              energy_score: 2
              sleep_quality: 2
              mood_tags:
                - anxious
                - tired
              note: 今天临近考试，整个人很紧绷
      responses:
        "200":
          description: 记录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodLogResponse"
              example:
                log_id: demo-log-id
                created_at: "2026-04-24T12:00:00Z"
                mood_score: 2
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/moods/trends:
    get:
      tags: [mood]
      summary: 获取情绪趋势
      operationId: getMoodTrend
      description: |
        Sprint 2 情绪趋势接口。趋势口径仅使用 `mood_score` 与 `mood_tags`，
        `anxiety_score`、`energy_score`、`sleep_quality` 仅随记录保存，暂不参与趋势图。
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: range
          required: false
          schema:
            type: string
            enum: [7d, 30d]
            default: 7d
          description: 趋势范围，仅支持近 7 天或近 30 天。
      responses:
        "200":
          description: 趋势聚合成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodTrendResponse"
              example:
                range: 7d
                avg_mood_score: 3
                top_tags:
                  - 焦虑
                  - 疲惫
                daily:
                  - date: "2026-05-03"
                    mood_score: 3
                    tags:
                      - 焦虑
                      - 疲惫
                summary: 最近 7 天共记录 2 次情绪，平均情绪分为 3。 高频标签主要是：焦虑、疲惫。
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/moods/weekly-summary:
    get:
      tags: [mood]
      summary: 获取每周情绪小结
      operationId: getWeeklyMoodSummary
      description: |
        Sprint 3 每周情绪小结接口。默认统计近 7 天 mood logs 与可用会话摘要，
        输出自我观察、主要标签和可执行建议；无 LLM 配置时必须返回稳定 fallback。
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 每周小结生成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyMoodSummaryResponse"
              example:
                range: 7d
                summary: 这周你的情绪整体偏紧绷，焦虑和疲惫出现得比较多。
                top_tags:
                  - 焦虑
                  - 疲惫
                suggested_actions:
                  - 选一天提前 30 分钟结束学习任务
                  - 睡前做一次低刺激放松
                generated_by: fallback
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/safety/resources:
    get:
      tags: [safety]
      summary: 获取 SOS 资源
      operationId: getSafetyResources
      description: 高风险场景下前端可直接调用，用于渲染 SOS 页面或紧急引导卡片。
      parameters:
        - in: query
          name: region
          required: false
          schema:
            type: string
            default: CN
          description: 资源地域代码
        - in: query
          name: audience
          required: false
          schema:
            $ref: "#/components/schemas/SafetyAudience"
          description: 资源面向人群
      responses:
        "200":
          description: SOS 资源列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyResourcesResponse"
              example:
                region: CN
                audience: teen
                items:
                  - resource_type: trusted_adult
                    title: 联系可信任的大人
                    description: 先联系家长、老师或其他你信任的成年人
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/safety/crisis-events:
    post:
      tags: [safety]
      summary: 记录危机事件
      operationId: createCrisisEvent
      description: |
        当前端收到 `risk_level` 为 `L2` 或 `L3` 的回复时，应调用该接口记录危机事件，
        供 Sprint 1 Demo 中的风险留痕与后续人工排查使用。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrisisEventRequest"
            example:
              thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
              message_id: client-msg-001
              risk_level: L2
              detected_signals:
                - 不想活了
              action_taken:
                - open SOS
                - contact trusted person
      responses:
        "200":
          description: 记录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrisisEventResponse"
              example:
                event_id: demo-crisis-event
                thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                status: recorded
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/voice/sessions:
    post:
      tags: [voice]
      summary: 创建语音 MVP 会话
      operationId: createVoiceSession
      description: |
        Sprint 3 文本模拟语音 MVP。该接口只创建语音会话协议上下文，
        后续通过 WebSocket 传递文本模拟转写、状态事件和 AI 回复事件；
        不代表真实 ASR/TTS/WebRTC 已接入。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoiceSessionRequest"
            example:
              thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
              mode: companion
              save_transcript: true
      responses:
        "200":
          description: 语音 MVP 会话创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVoiceSessionResponse"
              example:
                voice_session_id: demo-voice-session
                thread_id: 0f8fad5b-d9cb-469f-a165-70867728950e
                ws_url: /api/v1/voice/sessions/demo-voice-session/ws
                protocol: text-simulated-voice-v1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/voice/sessions/{voice_session_id}/ws:
    x-websocket: true
    x-protocol: text-simulated-voice-v1
    parameters:
      - in: path
        name: voice_session_id
        required: true
        schema:
          type: string
    description: |
      WebSocket 通道。客户端发送 `user_text`、`interrupt`、`end_session`；
      服务端发送 `session_ready`、`listening`、`transcript`、`assistant_delta`、
      `assistant_final`、`session_ended`、`error`。高风险文本必须复用统一安全分流。

  /api/v1/feedback:
    post:
      tags: [feedback]
      summary: 提交用户反馈
      operationId: submitFeedback
      description: |
        Sprint 3 内容反馈接口。用于记录用户对 AI 回复、知识答案或测试结果的 1-5 分评分、
        标签和备注；反馈不改变当前回复，只用于后续质量评估。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
            example:
              target_type: assistant_message
              target_id: message-id
              rating: 4
              tags:
                - 有帮助
                - 语气合适
              note: 希望再短一点
      responses:
        "200":
          description: 反馈记录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
              example:
                feedback_id: demo-feedback-id
                status: recorded
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/knowledge/search:
    get:
      tags: [knowledge]
      summary: 搜索知识文章
      operationId: searchKnowledge
      description: |
        Sprint 2 知识库 MVP 使用数据库文章和简单关键词召回，不依赖 Elasticsearch。
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
            default: ""
          description: 搜索关键词
        - in: query
          name: category
          required: false
          schema:
            type: string
          description: emotion / relationship / sleep / self_help / teen / safety
        - in: query
          name: audience
          required: false
          schema:
            type: string
            enum: [all, teen, adult]
      responses:
        "200":
          description: 知识文章列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeSearchResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/knowledge/articles/{article_id}:
    get:
      tags: [knowledge]
      summary: 获取知识文章详情
      operationId: getKnowledgeArticle
      parameters:
        - in: path
          name: article_id
          required: true
          schema:
            type: string
          description: 支持文章 UUID 或 slug
      responses:
        "200":
          description: 知识文章详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeArticleResponse"
        "404":
          description: 知识文章不存在
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/knowledge/ask:
    post:
      tags: [knowledge]
      summary: 结合知识库回答问题
      operationId: askKnowledge
      description: |
        返回固定结构的科普/自助回答。若识别到 L2/L3 风险，必须中断普通知识问答并返回 crisis 上下文。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskKnowledgeRequest"
            example:
              question: 焦虑依恋和太喜欢一个人有什么区别？
              use_my_context: true
      responses:
        "200":
          description: 结构化知识回答
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskKnowledgeResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/knowledge/gaps:
    get:
      tags: [knowledge]
      summary: 查看知识库待补充问题
      operationId: listKnowledgeGaps
      description: 内部审核入口；用于查看用户问过但资料不足的问题。
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            default: open
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: 知识缺口列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeGapListResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/knowledge/gaps/{gap_id}/resolve:
    post:
      tags: [knowledge]
      summary: 标记知识缺口已解决
      operationId: resolveKnowledgeGap
      parameters:
        - in: path
          name: gap_id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveKnowledgeGapRequest"
      responses:
        "200":
          description: 知识缺口状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeGapMutationResponse"
        "404":
          description: 知识缺口不存在
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/tests:
    get:
      tags: [tests]
      summary: 获取测试列表
      operationId: listTests
      description: |
        Sprint 2 测试中心列表接口。当前 main 提供今日状态测试、16 型人格风格测试和 draft 状态的动漫测试占位。
        前端应只允许用户开始 `status=published` 的测试。
      responses:
        "200":
          description: 测试列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestListResponse"

  /api/v1/tests/history:
    get:
      tags: [tests]
      summary: 获取当前用户测试历史
      operationId: getTestHistory
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 已完成测试历史
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/tests/{test_id}:
    get:
      tags: [tests]
      summary: 获取测试题目
      operationId: getTest
      parameters:
        - in: path
          name: test_id
          required: true
          schema:
            type: string
          description: 测试 ID，例如 `state-check-v1` 或 `sixteen-type-v1`
      responses:
        "200":
          description: 测试详情与题目选项
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestDetailResponse"
        "404":
          description: 测试不存在
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/tests/{test_id}/attempts:
    post:
      tags: [tests]
      summary: 开始一次测试
      operationId: startTestAttempt
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: test_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 已创建作答 attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAttemptResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 测试不存在
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/tests/attempts/{attempt_id}/answers:
    post:
      tags: [tests]
      summary: 提交单题答案
      operationId: submitAnswer
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: attempt_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerRequest"
            example:
              question_index: 0
              option_id: B
      responses:
        "200":
          description: 答案已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResponse"
        "400":
          description: attempt 或答案无效
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/tests/attempts/{attempt_id}/complete:
    post:
      tags: [tests]
      summary: 完成测试并生成结果
      operationId: completeAttempt
      description: |
        结果文案只能作为自我观察和陪伴上下文，不能作为诊断或临床结论。
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: attempt_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 测试结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteAttemptResponse"
        "400":
          description: attempt 不存在、已完成或题目未答完
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/tests/attempts/{attempt_id}/result:
    get:
      tags: [tests]
      summary: 查询已完成测试结果
      operationId: getAttemptResult
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: attempt_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 已完成测试结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteAttemptResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: attempt 不存在或尚未完成
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: 未登录或 access token 已失效

    ValidationError:
      description: 请求参数校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HTTPValidationError"

  schemas:
    AgeRange:
      type: string
      enum:
        - 13_15
        - 16_17
        - 18_plus
      description: 注册阶段用于推导 teen/adult 模式

    UserMode:
      type: string
      enum:
        - teen
        - adult

    ThreadMode:
      type: string
      enum:
        - companion
        - knowledge
        - test
        - crisis
      description: |
        当前 Sprint 1 正式使用 `companion` 为主；
        其余值保留字段兼容性，不代表对应能力已纳入 Sprint 1 范围。

    InputType:
      type: string
      enum:
        - text
        - voice
        - test
        - system

    RiskLevel:
      type: string
      enum:
        - L0
        - L1
        - L2
        - L3
      description: |
        L0=正常，L1=中低风险情绪波动，L2/L3=需进入安全分流。

    TurnStatus:
      type: string
      enum:
        - accepted
        - running
        - completed
        - failed

    MemoryJobStatus:
      type: string
      enum:
        - pending
        - running
        - completed
        - failed
        - skipped

    MemoryMode:
      type: string
      enum:
        - off
        - summary_only
        - long_term
      description: 关闭、只记摘要、长期记忆。

    SafetyAudience:
      type: string
      enum:
        - all
        - teen
        - adult

    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiRootResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        age_range:
          $ref: "#/components/schemas/AgeRange"
      required:
        - email
        - password
        - age_range

    RegisterResponse:
      type: object
      properties:
        user_id:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
        user_mode:
          $ref: "#/components/schemas/UserMode"
        onboarding_completed:
          type: boolean
      required:
        - user_id
        - access_token
        - refresh_token
        - user_mode
        - onboarding_completed

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required:
        - access_token
        - refresh_token

    CurrentUserResponse:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
        nickname:
          type: string
        age_range:
          $ref: "#/components/schemas/AgeRange"
        user_mode:
          $ref: "#/components/schemas/UserMode"
        usage_goals:
          type: array
          items:
            type: string
        onboarding_completed:
          type: boolean
        memory_mode:
          $ref: "#/components/schemas/MemoryMode"
        companion_style:
          type: string
        voice_enabled:
          type: boolean
        save_voice_audio:
          type: boolean
        save_transcript:
          type: boolean
      required:
        - user_id
        - username
        - nickname
        - age_range
        - user_mode
        - usage_goals
        - onboarding_completed
        - memory_mode
        - companion_style
        - voice_enabled
        - save_voice_audio
        - save_transcript

    UserSettingsUpdateRequest:
      type: object
      properties:
        memory_mode:
          $ref: "#/components/schemas/MemoryMode"
        companion_style:
          type: string
        voice_enabled:
          type: boolean
        save_voice_audio:
          type: boolean
        save_transcript:
          type: boolean
      additionalProperties: false

    UserSettingsResponse:
      type: object
      properties:
        memory_mode:
          $ref: "#/components/schemas/MemoryMode"
        companion_style:
          type: string
        voice_enabled:
          type: boolean
        save_voice_audio:
          type: boolean
        save_transcript:
          type: boolean
      required:
        - memory_mode
        - companion_style
        - voice_enabled
        - save_voice_audio
        - save_transcript

    PrivacyDataScope:
      type: string
      enum:
        - memories
        - chat
        - moods
        - feedback
        - voice
        - all_non_account

    PrivacySettingsSnapshot:
      type: object
      properties:
        memory_mode:
          $ref: "#/components/schemas/MemoryMode"
        companion_style:
          type: string
        voice_enabled:
          type: boolean
        save_voice_audio:
          type: boolean
        save_transcript:
          type: boolean
      required:
        - memory_mode
        - companion_style
        - voice_enabled
        - save_voice_audio
        - save_transcript

    PrivacyDataCounts:
      type: object
      properties:
        memories:
          type: integer
        chat_threads:
          type: integer
        chat_messages:
          type: integer
        mood_logs:
          type: integer
        test_history:
          type: integer
        feedback:
          type: integer
        voice_sessions:
          type: integer
        risk_events:
          type: integer
      required:
        - memories
        - chat_threads
        - chat_messages
        - mood_logs
        - test_history
        - feedback
        - voice_sessions
        - risk_events

    PrivacySummaryResponse:
      type: object
      properties:
        user_mode:
          $ref: "#/components/schemas/UserMode"
        settings:
          $ref: "#/components/schemas/PrivacySettingsSnapshot"
        counts:
          $ref: "#/components/schemas/PrivacyDataCounts"
        latest_updated_at:
          type: string
          format: date-time
          nullable: true
      required:
        - user_mode
        - settings
        - counts
        - latest_updated_at

    DataDeleteRequest:
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/PrivacyDataScope"
      required:
        - scope
      additionalProperties: false

    AccountDeleteRequest:
      type: object
      properties:
        confirmation:
          type: string
          enum:
            - DELETE
      required:
        - confirmation
      additionalProperties: false

    PrivacyMutationResponse:
      type: object
      properties:
        status:
          type: string
        scope:
          type: string
        affected_counts:
          type: object
          additionalProperties:
            type: integer
      required:
        - status
        - affected_counts

    PersonalDataExport:
      type: object
      additionalProperties: true

    StartThreadRequest:
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/ThreadMode"
          default: companion
        title:
          type: string
      additionalProperties: false

    StartThreadResponse:
      type: object
      properties:
        thread_id:
          type: string
        langgraph_thread_id:
          type: string
        mode:
          type: string
        title:
          type: string
      required:
        - thread_id
        - langgraph_thread_id
        - mode
        - title

    SendMessageRequest:
      type: object
      properties:
        user_id:
          type: string
        client_message_id:
          type: string
          description: 客户端生成的发送幂等键；同一用户、同一会话内重复使用时后端会重放已有 turn。
        content:
          type: string
        input_type:
          $ref: "#/components/schemas/InputType"
          default: text
        user_mode:
          $ref: "#/components/schemas/UserMode"
          default: adult
      required:
        - user_id
        - content

    AssistantMessage:
      type: object
      properties:
        assistant_text:
          type: string
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        intent:
          type: string
          description: LangGraph 意图识别结果
        suggested_actions:
          type: array
          items:
            type: string
        session_summary:
          type: string
          description: 当前轮对话摘要，供首页续聊展示使用
        should_write_memory:
          type: boolean
        referenced_memories:
          type: array
          items:
            $ref: "#/components/schemas/MemoryReference"
        delivery_status:
          type: string
          enum: [generated, failed_no_reply, safety_fallback]
        failure_reason:
          type: string
          nullable: true
        retryable:
          type: boolean
        memory_job_id:
          type: string
          nullable: true
        memory_job_status:
          $ref: "#/components/schemas/MemoryJobStatus"
      required:
        - assistant_text
        - risk_level
        - intent
        - suggested_actions
        - session_summary
        - should_write_memory
        - referenced_memories

    SendMessageResponse:
      type: object
      properties:
        thread_id:
          type: string
        message_id:
          type: string
        assistant_message_id:
          type: string
          nullable: true
        client_message_id:
          type: string
        turn_id:
          type: string
        turn_status:
          $ref: "#/components/schemas/TurnStatus"
        assistant_message:
          $ref: "#/components/schemas/AssistantMessage"
          nullable: true
        delivery_status:
          type: string
          enum: [generated, failed_no_reply, safety_fallback]
        failure_reason:
          type: string
          nullable: true
        retryable:
          type: boolean
      required:
        - thread_id
        - message_id
        - assistant_message_id
        - client_message_id
        - turn_id
        - turn_status
        - assistant_message
        - delivery_status
        - retryable

    ChatStreamTokenEvent:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    ChatStreamGraphUpdateEvent:
      type: object
      properties:
        node:
          type: string
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
      required:
        - node

    ChatStreamFinalEvent:
      type: object
      properties:
        thread_id:
          type: string
        message_id:
          type: string
        assistant_message_id:
          type: string
          nullable: true
        client_message_id:
          type: string
        turn_id:
          type: string
        turn_status:
          $ref: "#/components/schemas/TurnStatus"
        assistant_text:
          type: string
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        intent:
          type: string
        suggested_actions:
          type: array
          items:
            type: string
        session_summary:
          type: string
        should_write_memory:
          type: boolean
        referenced_memories:
          type: array
          items:
            $ref: "#/components/schemas/MemoryReference"
        delivery_status:
          type: string
          enum: [generated, failed_no_reply, safety_fallback]
        failure_reason:
          type: string
          nullable: true
        retryable:
          type: boolean
        memory_job_id:
          type: string
          nullable: true
        memory_job_status:
          $ref: "#/components/schemas/MemoryJobStatus"
      required:
        - thread_id
        - message_id
        - assistant_message_id
        - client_message_id
        - turn_id
        - turn_status
        - assistant_text
        - risk_level
        - intent
        - suggested_actions
        - session_summary
        - should_write_memory
        - referenced_memories
        - delivery_status
        - retryable

    MemoryReference:
      type: object
      properties:
        memory_id:
          type: string
        memory_type:
          type: string
        content:
          type: string
      required:
        - memory_id
        - memory_type
        - content

    MemoryItem:
      type: object
      properties:
        memory_id:
          type: string
        memory_type:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - memory_id
        - memory_type
        - content
        - created_at
        - updated_at

    ListMemoriesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryItem"
      required:
        - items

    UpdateMemoryRequest:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    MemoryMutationResponse:
      type: object
      properties:
        memory_id:
          type: string
        content:
          type: string
        status:
          type: string
      required:
        - status

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MoodLogRequest:
      type: object
      properties:
        mood_score:
          type: integer
          minimum: 1
          maximum: 5
        anxiety_score:
          type: integer
          minimum: 1
          maximum: 5
        energy_score:
          type: integer
          minimum: 1
          maximum: 5
        sleep_quality:
          type: integer
          minimum: 1
          maximum: 5
        mood_tags:
          type: array
          items:
            type: string
        note:
          type: string
      required:
        - mood_score

    MoodLogResponse:
      type: object
      properties:
        log_id:
          type: string
        created_at:
          type: string
          format: date-time
        mood_score:
          type: integer
      required:
        - log_id
        - created_at
        - mood_score

    DailyMoodPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        mood_score:
          type: number
        tags:
          type: array
          items:
            type: string
      required:
        - date
        - mood_score
        - tags

    MoodTrendResponse:
      type: object
      properties:
        range:
          type: string
          enum: [7d, 30d]
        avg_mood_score:
          type: number
        top_tags:
          type: array
          items:
            type: string
